server:
  port: 8084

spring:
  application:
    name: paymentservice

  datasource:
    url: jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true
    username: username
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: ""
      password: ""
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:            #eureka is at root level, not under spring
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

razorpay:
  key-id: ${RAZORPAY_KEY_ID:your_razorpay_key_id_here}
  key-secret: ${RAZORPAY_KEY_SECRET:your_razorpay_key_secret_here}

payment:
  currency: INR
