server:
  port: 8082

spring:
  application:
    name: catalogservice
  profiles:
    default: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0
