server:
  port: 8083

spring:
  application:
    name: orderservice

  datasource:
    url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true
    username: username
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379


#  rabbitmq:
#    host: localhost
#    port: 5672
#    username: guest
#    password: guest

eureka:            #eureka is at root level, not under spring
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
