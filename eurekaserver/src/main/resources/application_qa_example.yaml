eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${eureka.instance.hostname}:${server.port}/eureka/}
  server:
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 15000

logging:
  level:
    root: INFO

