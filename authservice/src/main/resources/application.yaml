
server:
  port: 8081
spring:
  application:
    name: authservice
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:     #it is under spring, not under datasource
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:            #eureka is at root level, not under spring
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true
jwt:
  secret: CFBdVo5vxqyLVe2pr8jx9STdgrUGdD1m3IanHcnuYh1
  expiration: 86400000 #24 hrs in milliseconds