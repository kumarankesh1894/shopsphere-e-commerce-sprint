server:
  port: 8085

spring:
  application:
    name: adminservice

  datasource:
    url: jdbc:mysql://localhost:3306/admindb?createDatabaseIfNotExist=true
    username: username
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

# Eureka Config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Feign Config
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

# Logging (for debugging Feign calls)
logging:
  level:
    com.shopsphere: DEBUG
    org.springframework.cloud.openfeign: DEBUG

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

