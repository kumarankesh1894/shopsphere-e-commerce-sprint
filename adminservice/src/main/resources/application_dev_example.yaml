spring:
  datasource:
    url: jdbc:mysql://localhost:3306/admindb?createDatabaseIfNotExist=true
    username: username
    password: password

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.shopsphere: DEBUG
    org.springframework.cloud.openfeign: DEBUG

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}